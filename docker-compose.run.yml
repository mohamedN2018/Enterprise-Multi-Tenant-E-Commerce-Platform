# Run profile: expose ONLY the web API on the host (port 8000). The backing
# services (db / redis / minio) stay on the internal Docker network with no host
# ports, so this stack runs even when 5432/6379/9000 are already taken on the
# host. The frontend is a separate app that talks to http://localhost:8000.
services:
  web:
    # Host 8000 is already taken on this machine; publish the API on 8088 instead.
    ports: !override
      - "8088:8000"
  db:
    ports: !override []
  redis:
    ports: !override []
  minio:
    ports: !override []
  worker:
    ports: !override []
  beat:
    ports: !override []
