name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test (PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: marketplace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketplace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key-0123456789-abcdefghijklmnop
      TEST_DATABASE_URL: postgres://marketplace:marketplace@localhost:5432/marketplace

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Ruff lint
        run: ruff check apps config

      - name: Ruff format check
        run: ruff format --check apps config

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests on PostgreSQL (with coverage)
        run: pytest apps --cov=apps --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
