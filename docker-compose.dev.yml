# ===========================================================================
# Local development stack (hot-reload). For production/Dokploy use the default
# docker-compose.yml instead.
#
#   docker compose -f docker-compose.dev.yml up
#
# Backend code is bind-mounted for autoreload; frontend runs Vite on :3000.
# ===========================================================================
name: marketplace-dev

x-django-env: &django-env
  env_file: .env

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./backend
      args:
        REQUIREMENTS: requirements/development.txt
    <<: *django-env
    command: ["uvicorn", "config.asgi:application", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      args:
        REQUIREMENTS: requirements/development.txt
    <<: *django-env
    entrypoint: []
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      args:
        REQUIREMENTS: requirements/development.txt
    <<: *django-env
    entrypoint: []
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-slim
    working_dir: /app
    command: ["sh", "-lc", "npm install --no-audit --no-fund && npm run start -- --host 0.0.0.0"]
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - web

volumes:
  pgdata:
  redisdata:
