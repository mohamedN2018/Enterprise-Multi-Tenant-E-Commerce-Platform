# Serves the Vue SPA and reverse-proxies API/admin traffic to the backend,
# so frontend + backend share one origin (no CORS). The backend host is
# resolved at request time via Docker's embedded DNS (127.0.0.11) so this
# container starts even if the backend is briefly unavailable.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Hashed build assets — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend: API, Django admin, OpenAPI schema/docs, static, media.
    location ~ ^/(api|django-admin|static|media|health)/ {
        resolver 127.0.0.11 valid=10s;
        set $backend http://qshop-backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (Django Channels), if/when realtime UI is added.
    location /ws/ {
        resolver 127.0.0.11 valid=10s;
        set $backend http://qshop-backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA: everything else falls back to the app shell (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
