openapi: 3.0.3
info:
  title: Marketplace API
  version: 1.0.0
  description: |-
    Enterprise multi-tenant (Shopify-style) e-commerce backend.

    **Authentication:** Bearer JWT (obtain a token at `/api/v1/auth/login/`).

    **Multi-tenancy:** store-scoped endpoints require the active store via the `X-Store-Id` (UUID) or `X-Store-Slug` request header.
  contact:
    name: API support
    email: api@marketplace.local
  license:
    name: Proprietary
paths:
  /health/:
    get:
      operationId: health_retrieve
      description: Liveness/readiness probe. Verifies database connectivity.
      summary: Health check
      tags:
      - system
      responses:
        '200':
          description: No response body
        '503':
          description: No response body
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: APIView with actor-context binding. Use for non-model endpoints.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
