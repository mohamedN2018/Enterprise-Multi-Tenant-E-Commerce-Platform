      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - name: X-Store-Id
        in: header
        required: false
        description: Active store (tenant) UUID. Required by store-scoped endpoints;
          alternatively send X-Store-Slug.
        schema:
          type: string
          format: uuid
      - name: X-Store-Slug
        in: header
        required: false
        description: Active store (tenant) slug — an alternative to X-Store-Id.
        schema:
          type: string
      tags:
      - stores
