          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStoreUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStoreUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
          description: ''
    delete:
      operationId: stores_destroy
      description: |-
