            schema:
              $ref: '#/components/schemas/StoreCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StoreCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
          description: ''
      parameters:
      - name: X-Store-Id
        in: header
        required: false
        description: Active store (tenant) UUID. Required by store-scoped endpoints;
          alternatively send X-Store-Slug.
        schema:
          type: string
          format: uuid
      - name: X-Store-Slug
        in: header
        required: false
        description: Active store (tenant) slug — an alternative to X-Store-Id.
        schema:
          type: string
  /api/v1/stores/{store_id}/:
    get:
      operationId: stores_retrieve
      description: |-
        Loads the store from the URL and enforces the caller's membership role.

        On success, sets ``self.membership`` and returns the ``Store``. Raises
        ``NotFoundError`` (unknown store) or ``PermissionDeniedError`` (not a member /
        insufficient role).
      parameters:
      - in: path
        name: store_id
        schema:
          type: string
          format: uuid
        required: true
      - name: X-Store-Id
        in: header
        required: false
        description: Active store (tenant) UUID. Required by store-scoped endpoints;
          alternatively send X-Store-Slug.
        schema:
          type: string
          format: uuid
      - name: X-Store-Slug
        in: header
        required: false
        description: Active store (tenant) slug — an alternative to X-Store-Id.
        schema:
          type: string
      tags:
      - stores
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
          description: ''
