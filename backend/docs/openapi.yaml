          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 120
        code:
          type: string
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
        countries: {}
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    TaxZoneRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        code:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
        countries: {}
        is_default:
          type: boolean
      required:
      - name
    TokenPair:
      type: object
      description: Documents the token payload returned by login/refresh.
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        is_active:
          type: boolean
          readOnly: true
          description: Inactive accounts cannot authenticate.
        is_staff:
          type: boolean
          readOnly: true
          description: Designates access to the Django admin site.
        is_superuser:
          type: boolean
          readOnly: true
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        is_verified:
          type: boolean
          readOnly: true
          description: Whether the email address has been verified.
        two_factor_enabled:
          type: boolean
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
