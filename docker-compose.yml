# ===========================================================================
# Production stack (Dokploy-ready).
#
#   qshop-frontend ─ nginx: serves the Vue SPA + reverse-proxies /api,/django-
#                    admin,/static,/media,/ws,/health to the backend (single
#                    origin, no CORS). The ONLY service with a host port —
#                    attach your Dokploy domain to it (port 80).
#   qshop-backend  ─ Django/DRF under Gunicorn+Uvicorn (internal only).
#   qshop-worker   ─ Celery worker.   qshop-beat ─ Celery beat scheduler.
#   qshop-db       ─ PostgreSQL 16.   qshop-redis ─ cache / broker / channels.
#
# In Dokploy set the Compose Path to  ./docker-compose.yml  (NOT the .dev one).
#
# Networking: every service joins Dokploy's existing "dokploy-network" instead
# of creating a new per-app bridge network. This deliberately creates ZERO new
# networks, so it can never hit the daemon's "all predefined address pools have
# been fully subnetted" error. Service names are uniquely prefixed (qshop-*) so
# they don't clash with other apps sharing that network.
#
# Configure via .env (see .env.example). For local dev use docker-compose.dev.yml.
# ===========================================================================
name: qshop

x-backend: &backend
  build:
    context: ./backend
  image: qshop-backend:latest
  env_file: .env
  restart: unless-stopped
  depends_on:
    qshop-db:
      condition: service_healthy
    qshop-redis:
      condition: service_healthy

services:
  qshop-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qshop-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qshop-backend:
    <<: *backend
    # entrypoint waits for the DB, migrates, collectstatic; CMD = Gunicorn (from Dockerfile)
    volumes:
      - media:/app/media
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  qshop-worker:
    <<: *backend
    entrypoint: []
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    volumes:
      - media:/app/media

  qshop-beat:
    <<: *backend
    entrypoint: []
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

  qshop-frontend:
    build:
      context: ./frontend
      args:
        # Relative API base → SPA calls the same origin; nginx proxies to backend.
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    image: qshop-frontend:latest
    restart: unless-stopped
    depends_on:
      qshop-backend:
        condition: service_started
    # Single, app-unique host port. With a Dokploy domain you can drop this and
    # let Traefik route to container port 80 over dokploy-network.
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pgdata:
  redisdata:
  media:

# Reuse Dokploy's existing shared network — no new subnet is allocated.
# Override the name via DOKPLOY_NETWORK if your Dokploy uses a different one.
networks:
  default:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
