# ===========================================================================
# Production stack (Dokploy-ready).
#
#   frontend  ─ nginx: serves the Vue SPA + reverse-proxies /api,/admin,
#               /static,/media,/ws to the backend (single origin, no CORS).
#               This is the ONLY service with a host port — attach your
#               Dokploy domain to it (service "frontend", port 80).
#   backend   ─ Django/DRF under Gunicorn+Uvicorn (internal only).
#   worker    ─ Celery worker.      beat ─ Celery beat scheduler.
#   db        ─ PostgreSQL 16.      redis ─ cache / broker / channels.
#
# Configure via .env (see .env.example). For local dev with hot-reload use
# docker-compose.dev.yml instead.
# ===========================================================================
name: marketplace

x-backend: &backend
  build:
    context: ./backend
  image: marketplace-backend:latest
  env_file: .env
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    <<: *backend
    # entrypoint waits for the DB, migrates, collectstatic; CMD = Gunicorn (from Dockerfile)
    volumes:
      - media:/app/media
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  worker:
    <<: *backend
    entrypoint: []
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    volumes:
      - media:/app/media

  beat:
    <<: *backend
    entrypoint: []
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

  frontend:
    build:
      context: ./frontend
      args:
        # Relative API base → SPA calls the same origin; nginx proxies to backend.
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    image: marketplace-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pgdata:
  redisdata:
  media:
